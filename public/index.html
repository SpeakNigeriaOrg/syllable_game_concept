<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Nigeria - Syllable Game</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-overlay">
        <button onclick="startGame()">Begin Syllable Game!</button>
    </div>

    <div id="app-wrapper">
        <!-- Slim brand bar, not a hero block: a small wordmark plus the
             theme control, kept to a single compact row so the game
             itself gets almost the entire viewport. -->
        <header id="top-bar">
            <span id="brand-mark">
                <img src="favicon.svg" alt="" width="18" height="18">
                Speak Nigeria
            </span>
            <select id="theme-selector" aria-label="Choose a level"></select>
        </header>

        <main id="game-container">

            <!-- Hint/skip are icon buttons flanking the image, not a
                 separate text-button row - reclaims a whole line. -->
            <div id="stage-row">
                <button id="hint-btn" class="icon-btn" onclick="toggleToneHint()" aria-label="Toggle tone hint" title="Show tone hint">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                        <line x1="6" y1="17" x2="6" y2="9"/>
                        <line x1="12" y1="17" x2="12" y2="5"/>
                        <line x1="18" y1="17" x2="18" y2="13"/>
                    </svg>
                </button>

                <div id="prompt-container" class="prompt-container" onclick="playFullWordAudio()">
                    <img id="prompt-image" src="" alt="Listen and build" />

                    <div class="audio-overlay">
                        <svg fill="#ffffff" viewBox="0 0 24 24" width="40px" height="40px">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </div>

                    <div id="correct-badge" class="correct-badge" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="56px" height="56px">
                            <circle cx="12" cy="12" r="11" fill="var(--accent-courses)"/>
                            <path d="M6.5 12.5l3.5 3.5 7.5-8" stroke="white" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <button id="skip-btn" class="icon-btn" onclick="skipWord()" aria-label="Skip word" title="Skip word">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M6 5l8 7-8 7V5z"/>
                        <rect x="16" y="5" width="2.5" height="14" rx="1"/>
                    </svg>
                </button>
            </div>

            <!-- Tone-hint dots for each slot are always in the DOM (see
                 style.css) but only visible while #hint-btn is toggled on
                 (queue-slots.show-hint) - no dedicated text line needed. -->
            <div id="queue-slots" class="slots-container"></div>

            <div id="feedback-message"></div>

            <div id="syllable-matrix" class="syllable-matrix">

                <div class="tone-group tone-group-high" id="high-tones">
                    <span class="tone-badge" title="High tone">˥</span>
                    <div class="bank-row"></div>
                </div>
                <div class="tone-group tone-group-mid" id="mid-tones">
                    <span class="tone-badge" title="Mid tone">˧</span>
                    <div class="bank-row"></div>
                </div>
                <div class="tone-group tone-group-low" id="low-tones">
                    <span class="tone-badge" title="Low tone">˩</span>
                    <div class="bank-row"></div>
                </div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
